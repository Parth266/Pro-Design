<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProDesign Digital Business Card</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #315b4b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Card Container */
        .card-container {
            background: #fcf1e2;
            width: 100%;
            max-width: 420px;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* Logo Styling */
        .logo-section {
            margin-bottom: 20px;
        }

        .logo {
            width: 200px;
            height: 200px;
                       
        }

        header h1 {
            font-size: 1.6rem;
            color: #315b4b;
            margin-bottom: 8px;
        }

        .title {
            font-size: 0.95rem;
            color: #315b4b;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Links/Buttons Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Individual Link Cards */
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background-color: #315b4b; /* Professional Dark Base */
            color: #ffffff;
            padding: 18px;
            border-radius: 14px;
            transition: all 0.3s ease;
            position: relative;
            font-size: 1rem;
            font-weight: 500;
        }

        /* Icon Positioning */
        .link-card i {
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
        }

        /* Hover States */
        .link-card:hover {
            background-color: #4d6b5d;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Social Icons Footer */
        .social-icons {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .social-icons a {
            color: #555;
            font-size: 1.4rem;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #007AFF; /* Link Blue */
        }

        /* Responsive UI for very small screens */
        @media (max-width: 400px) {
            .card-container {
                padding: 30px 15px;
                box-shadow: none;
                background: transparent;
            }
            body {
                background-color: #fcf1e2;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="logo-section">
            <img src="https://raw.githubusercontent.com/Parth266/Pro-Design/refs/heads/main/Logo.svg" alt="ProDesign" class="logo">
        </div>

        <header>
            <h1>Er. Salahuddin Liaz S</h1>
            <p class="title">Founder</p>
        </header>

        <div class="links-container">
            <a href="tel:+919677123145" class="link-card">
                <i class="fas fa-phone-alt"></i>
                <span>Call Business Line</span>
            </a>

            <a href="mailto:salahuddin.liaz@gmail.com" class="link-card">
                <i class="fas fa-envelope"></i>
                <span>Send an Email</span>
            </a>

            <a href="https://maps.app.goo.gl/86ct4Ayo2YceiVzj8" target="_blank" class="link-card">
                <i class="fas fa-map-marker-alt"></i>
                <span>Our Office Location</span>
            </a>

            <a href="https://www.pro-design.in" target="_blank" class="link-card">
                <i class="fas fa-globe"></i>
                <span>Official Website</span>
            </a>
        </div>

       	<!--<div class="social-icons">
            <a href="#" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" title="Twitter"><i class="fab fa-twitter"></i></a>
            </div> -->
    </div>

</body>
</html>
